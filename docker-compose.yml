version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: axium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: axium
      POSTGRES_USER: axium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U axium']
      interval: 30s
      timeout: 10s
      retries: 5

  # Axium Application
  axium:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axium-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Database
      DATABASE_URL: postgresql://axium:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/axium
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432

      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # App
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Optional: Mount for logs
      - ./logs:/app/logs

volumes:
  postgres_data:
