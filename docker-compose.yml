version: '3.8'

services:
  axium:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://axium:axiumpassword@postgres:5432/axium
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - axium-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=axium
      - POSTGRES_USER=axium
      - POSTGRES_PASSWORD=axiumpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U axium -d axium']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - axium-network

volumes:
  postgres_data:

networks:
  axium-network:
    driver: bridge
